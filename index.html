<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blender Node Asset Library</title>
    <style>
      :root {
        color-scheme: dark;
        background: radial-gradient(circle at top, #222233 0%, #0d0d10 55%, #050506 100%);
        color: #f3f4f8;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
      }
      .card {
        width: min(760px, 100%);
        background: rgba(14, 15, 26, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        padding: 40px;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.24);
        backdrop-filter: blur(18px);
      }
      .label {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: #8ea8ff;
      }
      .heading {
        margin: 0;
        font-size: clamp(2.2rem, 4vw, 3.6rem);
        line-height: 1.02;
      }
      .description {
        margin: 24px 0;
        font-size: 1.05rem;
        line-height: 1.7;
        color: #d9dbe8;
      }
      .link-box {
        margin-top: 24px;
        padding: 22px 24px;
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .link-title {
        margin: 0 0 10px;
        font-size: 0.95rem;
        color: #9bb4ff;
      }
      .url {
        display: block;
        font-size: 1.1rem;
        color: #fff;
        word-break: break-all;
        text-decoration: none;
      }
      .note {
        margin-top: 20px;
        font-size: 0.95rem;
        color: #a9b1d6;
      }
      .footer {
        margin-top: 32px;
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
        color: #7f88a4;
        font-size: 0.9rem;
      }
      .highlight {
        color: #8ea8ff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="label">Johnny Matthews</div>
      <h1 class="heading">Blender Node Asset Library</h1>
      <p class="description">
        This page is instructions for my Blender Nnode Asset Library. 
      </p>
      <div class="link-box">
        <p class="link-title">Use this URL in your Blender preferences:</p>
        <a class="url" href="https://johnnygizmo.github.io/node_repo/" target="_blank" rel="noopener noreferrer">
          https://johnnygizmo.github.io/node_repo/
        </a>
      </div>
      <p class="note">
        Tip: Copy the full URL exactly. Blender will pull the asset library from this GitHub Pages location.
      </p>
      <div class="footer">
        
      </div>
    </main>
  </body>
</html>
